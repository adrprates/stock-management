<!DOCTYPE html>
<html lang="pt-br" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/login.css}" rel="stylesheet"/>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
    <title>Login</title>
</head>
<body>
    <header>
        <div class="container-fluid topo">
            <div class="row">
                    <div class="col-12">
                        <div class="img-logo">
                            <img id="logo" name="logo" src="/imagens/logo.png" alt="Logo da empresa"/>
                        </div>
                    </div>
            </div>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row g-0">
                <div class="col-12">
                    <div class="infoLogin">
                        <div th:if="${mensagem != null}" class="alert alert-dismissible fade show" 
                            th:classappend="${tipoMensagem}" role="alert" style="margin-top: 15px; width: 75%;">
                            <span th:text="${mensagem}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <h1 id="titulo">Login</h1>
                        <div class="formulario">
                            <form th:action="@{/login}" method="POST">
                                <div class="form-group">
                                    <label for="email">E-mail:</label>
                                    <input id="email" name="email" type="email" class="form-control" required/>
                                </div>
                                <br>
                                <div class="form-group">
                                    <label for="senha">Senha:</label>
                                    <input id="senha" name="senha" type="password" class="form-control" required/>
                                </div>
                                <div class="form-group">
                                    <div class="infoBotao">
                                        <input id="btnEnviar" name="btnEnviar" type="submit" class="btn btn-primary" value="Enviar">
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="container-fluid inferior">
            <div class="row">
                <div class="col-12">
                    <p>© 2024 New West Company. Todos os direitos reservados.</p>
                </div>
            </div>
        </div>
    </footer> 
</body>
</html>
