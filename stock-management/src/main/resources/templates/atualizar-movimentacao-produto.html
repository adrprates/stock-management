<!DOCTYPE html>
<html lang="pt-br" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/css/atualizar-movimentacao-produto.css}" rel="stylesheet"/>
    <script th:src="@{/bootstrap/js/bootstrap.min.js}"></script>
    <title>Atualizar Movimentação de Produto</title>
</head>
<body>
    <header>
        <div class="container-fluid topo">
            <div class="row">
                    <div class="col-12">
                        <div class="img-logo">
                            <img id="logo" name="logo" src="/imagens/logo.png" alt="Logo da empresa"/>
                        </div>
                    </div>
            </div>
        </div>
    </header>
    <nav>
        <div class="container meio">
            <div class="row">
                <div class="col-12">
                    <div class="row g-2">
                        <div class="col-6 nav_col">
                            <div class="navbar">
                                <div class="menu_itens">
                                    <a th:href="@{/listagem-produtos}" id="produtos" alt="Produtos">
                                        <img id="produto_icon" src="/imagens/produto.png" alt="Ícone de produtos"/>
                                        <span class="descricao_item">Produtos</span>
                                    </a>
                                    <a th:href="@{/listagem-categorias}" id="categorias" alt="Categorias">
                                        <img id="categoria_icon" src="/imagens/categoria.png" alt="Ícone de categorias"/>
                                        <span class="descricao_item">Categorias</span>
                                    </a>
                                    <a th:href="@{/listagem-usuarios}" id="usuarios" alt="Usuários">
                                        <img id="usuarios_icon" src="/imagens/usuarios.png" alt="Ícone de usuários"/>
                                        <span class="descricao_item">Usuários</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div class="col-3 nav_col">
                            <div class="usuario">
                                <img id="usuario_icon" src="/imagens/usuario.png" alt="Ícone de usuário"/><br>
                                <span id ="usuario_nome" title="Nome">nome@nwest.com</span><br>
                                <span id="usuario_cargo" title="Cargo">Cargo</span>
                            </div>
                        </div>
                        <div class="col-3 nav_col">
                            <div class="sair">
                                <a href="#" id="logout" alt="Logout">
                                    <img id="logout" src="/imagens/logout.png" alt="Ícone de logout"/>
                                    <span class="descricao_item">Logout</span>
                                </a>
                            </div>
                        </div>  
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main>
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h1 id="titulo_movimentacao">Atualizar Movimentação</h1>
                    <h2 id="nome_produto" name="produto" th:text="${produto.nome}"></h2>
                    <h3 id="movimentacao_atual">Dados atuais da movimentação</h3>
                    <table class="table table-striped table-dark">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Tipo</th>
                                <th>Quantidade</th>
                                <th>Data</th>
                                <th>Horário</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td th:text="${movimentacao.id}"></td>
                                <td th:text="${movimentacao.produto.id} + ' - ' + ${movimentacao.produto.nome}"></td>
                                <td th:text="${movimentacao.tipo}"></td>
                                <td th:text="${movimentacao.quantidade}"></td>
                                <td th:text="${movimentacao.data}"></td>
                                <td th:text="${movimentacao.hora}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <form th:action="@{/salvar-movimentacao}" id="formulario" method="POST" th:object="${movimentacao}">
                        <input type="hidden" th:field="*{id}" />
                        <input type="hidden" th:name="produto.id" th:value="${produto.id}" />
                    
                        <div class="form-group">
                            <label for="tipo">Tipo: </label>
                            <select name="tipo" id="tipo" class="form-control" th:field="${movimentacao.tipo}" required>
                                <option value="Inclusão">Inclusão</option>
                                <option value="Retirada">Retirada</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="quantidade">Quantidade: </label>
                            <input id="quantidade" name="quantidade" type="number" class="form-control" th:field="${movimentacao.quantidade}" required/>
                        </div>
                        <div class="form-group">
                            <label for="data">Data</label>
                            <input id="data" name="data" type="date" class="form-control" th:field="${movimentacao.data}" required>
                        </div>
                        <div class="form-group">
                            <label for="hora">Horário</label>
                            <input id="hora" name="hora" type="time" class="form-control" th:field="${movimentacao.hora}" required>
                        </div>
                        <div class="form-group text-center">
                            <input id="btnEnviar" name="btnEnviar" type="submit" class="btn btn-primary" value="Enviar"/>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <div class="container-fluid inferior">
            <div class="row">
                <div class="col-12">
                    <p>© 2024 New West Company. Todos os direitos reservados.</p>
                </div>
            </div>
        </div>
    </footer>
    
</body>
</html>
